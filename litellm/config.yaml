model_list:
  # -------- OpenAI (gpt-5-* yoksa gpt-4o / gpt-4o-mini kullan) --------
  - model_name: chatgpt_cheap
    litellm_params:
      model: openai/gpt-4o-mini

  - model_name: chatgpt_best
    litellm_params:
      model: openai/gpt-4o

  # -------- Anthropic --------
  - model_name: claude_best
    litellm_params:
      model: anthropic/claude-sonnet-4-6

  - model_name: claude_cheap
    litellm_params:
      model: anthropic/claude-haiku-4-5

  # -------- xAI (Grok) --------
  - model_name: grok_cheap
    litellm_params:
      model: xai/grok-4-1-fast-non-reasoning

  - model_name: grok_best
    litellm_params:
      model: xai/grok-4-1-fast-reasoning

  # -------- Gemini --------
  - model_name: gemini_cheap
    litellm_params:
      model: gemini/gemini-2.5-flash-lite

  - model_name: gemini_best
    litellm_params:
      model: gemini/gemini-2.5-pro

router_settings:
  timeout: 60
